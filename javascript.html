<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Photography Portfolio</title>
    <style>
        body {
            margin: 0;
            background: url('https://unsplash.com') center/cover fixed;
            font-family: 'Inter', sans-serif;
            color: white;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            transition: background 0.3s ease;
        }

        nav.scrolled {
            background: rgba(0,0,0,0.9); /* Darker background when scrolled */
        }

        nav ul {
            display: flex;
            justify-content: center;
            list-style: none;
            padding: 15px 0;
            margin: 0;
        }

        nav ul li {
            margin: 0 20px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        nav ul li a:hover {
            color: #ccc;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 8px;
            padding: 100px 20px 20px; /* Top padding adjusted for fixed nav */
        }

        .gallery img {
            width: 100%;
            height: 250px; /* Set height for consistent grid look */
            object-fit: cover;
            border-radius: 4px;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .gallery img:hover {
            transform: scale(1.02);
        }

        .popup-image {
            position: fixed;
            top: 0; left: 0;
            background: rgba(0,0,0,.9);
            height: 100%;
            width: 100%;
            z-index: 10000;
            display: none;
            text-align: center;
            padding: 0 20px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .popup-image span {
            position: absolute;
            top: 20px; right: 20px;
            font-size: 60px;
            font-weight: bolder;
            color: #fff;
            cursor: pointer;
            z-index: 10000;
        }

        .popup-image img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Gallery</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <div class="gallery">
        <img src="https://unsplash.com" alt="Landscape">
        <img src="https://unsplash.com" alt="Portrait">
        <img src="https://unsplash.com" alt="Street">
        <img src="https://unsplash.com" alt="Nature">
        <img src="https://unsplash.com" alt="Urban">
        <img src="https://unsplash.com" alt="Architecture">
    </div>

    <script>
        // Lightbox functionality
        document.querySelectorAll('.gallery img').forEach(image => {
            image.onclick = () => {
                const popup = document.createElement('div');
                popup.classList.add('popup-image');
                popup.innerHTML = `
                    <span>&times;</span>
                    <img src="${image.getAttribute('src')}" alt="${image.getAttribute('alt')}">
                `;
                document.body.appendChild(popup);
                popup.style.display = 'flex'; // Changed to flex to center content

                popup.querySelector('span').onclick = () => {
                    popup.remove();
                };

                popup.onclick = (e) => {
                    if (e.target.classList.contains('popup-image')) {
                        popup.remove();
                    }
                };
            };
        });

        // Scroll-triggered navigation effect
        window.addEventListener('scroll', function() {
            const nav = document.querySelector('nav');
            if (window.scrollY > 50) { // Adjust scroll threshold as needed
                nav.classList.add('scrolled'); // Add a class to darken/style the nav
            } else {
                nav.classList.remove('scrolled');
            }
        });

        // Keyboard support for lightbox (ESC key)
        document.addEventListener('keydown', function(event) {
            const popupImage = document.querySelector('.popup-image');
            if (event.key === 'Escape' && popupImage && popupImage.style.display === 'flex') {
                popupImage.remove();
            }
        });
    </script>

</body>
</html>
